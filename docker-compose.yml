services:
  screenloop:
    build: .
    network_mode: host
    environment:
      SCREENLOOP_HTTP_PORT: "${SCREENLOOP_HTTP_PORT:-8099}"
      SCREENLOOP_USER: "${SCREENLOOP_USER:-admin}"
      SCREENLOOP_PASSWORD: "${SCREENLOOP_PASSWORD:?Set SCREENLOOP_PASSWORD in .env}"
      SCREENLOOP_SECRET_KEY: "${SCREENLOOP_SECRET_KEY:?Set SCREENLOOP_SECRET_KEY in .env}"
      SCREENLOOP_ADVERTISE_HOST: "${SCREENLOOP_ADVERTISE_HOST:-}"
    volumes:
      - screenloop-data:/data
    restart: unless-stopped

volumes:
  screenloop-data:
