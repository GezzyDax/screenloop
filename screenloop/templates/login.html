<!doctype html>
<html lang="{{ locale or 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Screenloop Login</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; font-family: "Trebuchet MS", Verdana, sans-serif; background: linear-gradient(135deg, #f5f2ea, #efe5d2); color: #191713; }
    .card { width: min(420px, calc(100vw - 2rem)); background: #fffdf8; border: 1px solid #d8d0c2; border-radius: 20px; padding: 1.25rem; box-shadow: 0 16px 40px rgba(47, 36, 22, .1); }
    h1 { margin: 0 0 .5rem; letter-spacing: -.04em; }
    p { color: #6f695f; }
    label { display: block; color: #6f695f; font-weight: 700; margin-top: .75rem; }
    input, button { width: 100%; padding: .75rem; border: 1px solid #d8d0c2; border-radius: 10px; margin-top: .25rem; }
    button { background: #a94724; color: white; font-weight: 800; cursor: pointer; margin-top: 1rem; border-color: transparent; }
  </style>
</head>
<body>
  <section class="card">
    <h1>Screenloop</h1>
    <p>{{ t("Sign in to manage TV playback and media uploads.") }}</p>
    <form method="post" action="/login">
      <label>{{ t("Username") }}</label>
      <input name="username" autocomplete="username" required autofocus>
      <label>{{ t("Password") }}</label>
      <input name="password" type="password" autocomplete="current-password" required>
      <button type="submit">{{ t("Sign in") }}</button>
    </form>
  </section>
</body>
</html>
