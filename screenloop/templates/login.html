<!doctype html>
<html lang="{{ locale or 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Screenloop Login</title>
  <style>
    :root {
      --ink: #172033;
      --muted: #66758a;
      --line: #d7e0eb;
      --accent: #155eef;
      --nav: #101a2b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Aptos", "Segoe UI", "Helvetica Neue", sans-serif;
      background:
        radial-gradient(circle at 16% 12%, rgba(21, 94, 239, .24), transparent 32rem),
        radial-gradient(circle at 88% 8%, rgba(16, 26, 43, .22), transparent 28rem),
        linear-gradient(135deg, #eef3f9, #dfe7f1);
      color: var(--ink);
      padding: 1rem;
    }
    .card {
      width: min(430px, 100%);
      background: rgba(255,255,255,.94);
      border: 1px solid rgba(255,255,255,.8);
      border-radius: 24px;
      padding: 1.35rem;
      box-shadow: 0 22px 65px rgba(16, 26, 43, .18);
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 4px;
      background: linear-gradient(90deg, var(--accent), transparent);
    }
    .brand-row { display: flex; gap: .75rem; align-items: center; margin-bottom: 1rem; }
    .brand-mark {
      width: 2.45rem;
      height: 2.45rem;
      border-radius: 14px;
      background: linear-gradient(135deg, #6ea8ff, var(--accent));
      display: grid;
      place-items: center;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.35), 0 12px 26px rgba(21,94,239,.28);
    }
    .brand-mark::before {
      content: "";
      width: 1.05rem;
      height: .72rem;
      border: 2px solid #fff;
      border-radius: 4px;
      box-shadow: 0 .46rem 0 -.28rem #fff;
    }
    h1 { margin: 0; letter-spacing: -.045em; line-height: 1; }
    p { color: var(--muted); margin-top: .35rem; }
    label { display: block; color: var(--muted); font-weight: 800; margin-top: .85rem; }
    input, button {
      width: 100%;
      padding: .78rem .82rem;
      border: 1px solid var(--line);
      border-radius: 12px;
      margin-top: .28rem;
      font: inherit;
    }
    input:focus { outline: 3px solid rgba(21, 94, 239, .14); border-color: var(--accent); }
    button {
      background: linear-gradient(135deg, var(--accent), #0d47bf);
      color: white;
      font-weight: 900;
      cursor: pointer;
      margin-top: 1rem;
      border-color: transparent;
      box-shadow: 0 12px 26px rgba(21,94,239,.22);
    }
    button:hover { filter: brightness(1.03); }
  </style>
</head>
<body>
  <section class="card">
    <div class="brand-row">
      <div class="brand-mark" aria-hidden="true"></div>
      <h1>Screenloop</h1>
    </div>
    <p>{{ t("Sign in to manage TV playback and media uploads.") }}</p>
    <form method="post" action="/login">
      <label>{{ t("Username") }}</label>
      <input name="username" autocomplete="username" required autofocus>
      <label>{{ t("Password") }}</label>
      <input name="password" type="password" autocomplete="current-password" required>
      <button type="submit">{{ t("Sign in") }}</button>
    </form>
  </section>
</body>
</html>
