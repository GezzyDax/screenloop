name: Bug report
description: Report a reproducible Screenloop problem
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail to reproduce it safely.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Upload ...
        2. Assign ...
        3. Click ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / image
      placeholder: ghcr.io/gezzydax/screenloop:dev or v0.3.0
  - type: dropdown
    id: tv
    attributes:
      label: TV profile
      options:
        - Samsung Legacy
        - Samsung Tizen
        - LG webOS
        - LG NetCast
        - Generic DLNA
        - Not TV-related
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Remove passwords, stream tokens, public IPs, and private data before posting.
      render: text
