name: CI

on:
  pull_request:
  push:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt ruff mypy
      - name: Lint
        run: python -m ruff check screenloop tests
      - name: Type check
        run: python -m mypy screenloop
      - name: Test
        run: python -m unittest discover -s tests

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Audit Python dependencies
        run: |
          python -m pip install pip-audit
          python -m pip_audit -r requirements.txt
      - name: Audit npm dependencies
        working-directory: frontend
        run: npm audit --audit-level=high

  no-merge-commits:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Reject merge commits ahead of base branch
        run: |
          git fetch origin "${{ github.base_ref }}"
          merges="$(git log --merges "origin/${{ github.base_ref }}..HEAD" --oneline)"
          if [ -n "$merges" ]; then
            echo "::error::This branch contains merge commits. They break GitHub's rebase-merge option and required_linear_history on main. Sync with the base branch using 'git rebase', not 'git merge'."
            echo "$merges"
            exit 1
          fi
