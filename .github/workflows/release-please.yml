name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  packages: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: simple
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
      - uses: actions/checkout@v5
        if: ${{ steps.release.outputs.release_created }}
      - uses: docker/setup-buildx-action@v3
        if: ${{ steps.release.outputs.release_created }}
      - uses: docker/login-action@v3
        if: ${{ steps.release.outputs.release_created }}
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: backend-meta
        if: ${{ steps.release.outputs.release_created }}
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}},value=${{ steps.release.outputs.tag_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.release.outputs.tag_name }}
            type=sha
      - uses: docker/build-push-action@v6
        if: ${{ steps.release.outputs.release_created }}
        with:
          context: .
          target: backend
          push: true
          tags: ${{ steps.backend-meta.outputs.tags }}
          labels: ${{ steps.backend-meta.outputs.labels }}
          build-args: |
            SCREENLOOP_VERSION=${{ steps.release.outputs.tag_name }}
            SCREENLOOP_REVISION=${{ github.sha }}
      - uses: docker/metadata-action@v5
        id: frontend-meta
        if: ${{ steps.release.outputs.release_created }}
        with:
          images: ghcr.io/${{ github.repository }}-ui
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}},value=${{ steps.release.outputs.tag_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.release.outputs.tag_name }}
            type=sha
      - uses: docker/build-push-action@v6
        if: ${{ steps.release.outputs.release_created }}
        with:
          context: .
          target: frontend
          push: true
          tags: ${{ steps.frontend-meta.outputs.tags }}
          labels: ${{ steps.frontend-meta.outputs.labels }}
