services:
  screenloop:
    image: "${SCREENLOOP_IMAGE:-ghcr.io/gezzydax/screenloop:latest}"
    network_mode: host
    environment:
      SCREENLOOP_HTTP_PORT: "${SCREENLOOP_HTTP_PORT:-8099}"
      SCREENLOOP_BOOTSTRAP_USER: "${SCREENLOOP_BOOTSTRAP_USER:-admin}"
      SCREENLOOP_BOOTSTRAP_PASSWORD: "${SCREENLOOP_BOOTSTRAP_PASSWORD:-}"
      SCREENLOOP_SECRET_KEY: "${SCREENLOOP_SECRET_KEY:?Set SCREENLOOP_SECRET_KEY in .env}"
      SCREENLOOP_ADVERTISE_HOST: "${SCREENLOOP_ADVERTISE_HOST:-}"
      SCREENLOOP_ADVERTISE_HOSTS: "${SCREENLOOP_ADVERTISE_HOSTS:-}"
      SCREENLOOP_ALLOWED_TV_CIDRS: "${SCREENLOOP_ALLOWED_TV_CIDRS:-}"
      SCREENLOOP_TRUSTED_PROXY_CIDRS: "${SCREENLOOP_TRUSTED_PROXY_CIDRS:-127.0.0.1/32,::1/128}"
      SCREENLOOP_COOKIE_SECURE: "${SCREENLOOP_COOKIE_SECURE:-false}"
      SCREENLOOP_ACCESS_LOG: "${SCREENLOOP_ACCESS_LOG:-true}"
      SCREENLOOP_MAX_UPLOAD_BYTES: "${SCREENLOOP_MAX_UPLOAD_BYTES:-2147483648}"
    volumes:
      - screenloop-data:/data
    restart: unless-stopped

volumes:
  screenloop-data:
